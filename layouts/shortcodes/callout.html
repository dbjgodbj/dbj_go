{{- $type := .Get "type" | default "note" -}}
{{- $labels := dict "note" "NOTE" "tip" "TIP" "important" "IMPORTANT" "warning" "WARNING" -}}
{{- $label := index $labels $type | default (upper $type) -}}
<div class="callout callout-{{ $type }}">
  <span class="callout-label">{{ $label }}</span>
  <div class="callout-body">{{ .Inner | markdownify }}</div>
</div>
